name: CI/CD - Front Despacho

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
          build-args: |
            VITE_API_DESPACHOS_URL=${{ secrets.VITE_API_DESPACHOS_URL }}
            VITE_API_VENTAS_URL=${{ secrets.VITE_API_VENTAS_URL }}

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
            docker stop front-despacho || true
            docker rm front-despacho || true
            docker run -d \
              --name front-despacho \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest